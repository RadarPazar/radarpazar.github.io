<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ürün Radar</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:40px;
}

.box {
    background:white;
    padding:25px;
    border-radius:15px;
    max-width:600px;
    margin:auto;
}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
}

button {
    width:100%;
    padding:12px;
    background:#222;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

h1 {
    text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h1>🚀 Ürün Radar</h1>

<label>Kategori</label>
<select>
<option>Kozmetik</option>
<option>Kişisel Bakım</option>
<option>Elektronik</option>
</select>

<label>Minimum Fiyat</label>
<input placeholder="250 TL">

<label>Maksimum Fiyat</label>
<input placeholder="1000 TL">

<label>Minimum Yorum</label>
<input placeholder="200">

<button>ARA</button>

</div>

</body>
</html>
